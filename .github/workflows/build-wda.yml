name: Build WDA

on:
  workflow_dispatch:
    inputs:
      wda_version:
        description: 'WDA version/tag (e.g. v9.11.0). Leave empty to use the latest release.'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve WDA version
        id: resolve_version
        run: |
          if [ -n "${{ github.event.inputs.wda_version }}" ]; then
            echo "tag=${{ github.event.inputs.wda_version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -fsSL https://api.github.com/repos/appium/WebDriverAgent/releases/latest \
                  | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone WebDriverAgent
        run: |
          git clone --depth 1 --branch "${{ steps.resolve_version.outputs.tag }}" \
            https://github.com/appium/WebDriverAgent.git

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build WDA for real device (arm64)
        working-directory: WebDriverAgent
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64

      - name: Locate built .app
        id: locate_app
        working-directory: WebDriverAgent
        run: |
          APP_PATH=$(find ./build -name "WebDriverAgentRunner-Runner.app" -type d | head -1)
          echo "app_path=${APP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Remove embedded XCTest frameworks (required for iOS 17+/18)
        working-directory: WebDriverAgent
        run: |
          APP="${{ steps.locate_app.outputs.app_path }}"
          rm -rf "${APP}/Frameworks/XC"*.framework
          rm -rf "${APP}/Frameworks/Testing.framework"
          rm -f  "${APP}/Frameworks/libXCTestSwiftSupport.dylib"

      - name: Create IPA
        working-directory: WebDriverAgent
        run: |
          APP="${{ steps.locate_app.outputs.app_path }}"
          mkdir Payload
          cp -r "${APP}" Payload/
          zip -r WebDriverAgent.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent.ipa
          path: WebDriverAgent/WebDriverAgent.ipa
          retention-days: 30

      - name: Upload raw .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-Runner.app
          path: WebDriverAgent/${{ steps.locate_app.outputs.app_path }}
          retention-days: 30
