name: Build WDA

on:
  workflow_dispatch:
    inputs:
      wda_version:
        description: 'WDA version tag (e.g. v9.11.0). Leave blank to use the latest release.'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Determine WDA version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.wda_version }}" ]; then
            echo "tag=${{ github.event.inputs.wda_version }}" >> "$GITHUB_OUTPUT"
          else
            latest=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/appium/WebDriverAgent/releases/latest \
              | python3 -c "import sys, json; data=json.load(sys.stdin); tag=data.get('tag_name'); sys.exit(print('ERROR: Could not determine latest WDA release tag. Response: '+json.dumps(data), file=sys.stderr) or 1) if not tag else print(tag)")
            echo "tag=${latest}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone WebDriverAgent
        run: |
          git clone --depth 1 --branch "${{ steps.version.outputs.tag }}" \
            https://github.com/appium/WebDriverAgent.git

      - name: Build WebDriverAgent
        run: |
          cd WebDriverAgent
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData

      - name: Package artifacts
        run: |
          cd WebDriverAgent
          xctestrun_file=$(find DerivedData -name '*.xctestrun' | head -1)
          if [ -z "$xctestrun_file" ]; then
            echo "ERROR: No .xctestrun file found in DerivedData" >&2
            exit 1
          fi
          products_dir=$(find DerivedData/Build/Products -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$products_dir" ]; then
            echo "ERROR: No build products directory found in DerivedData/Build/Products" >&2
            exit 1
          fi
          mkdir -p WDA-artifacts
          cp "$xctestrun_file" WDA-artifacts/
          cp -R "$products_dir" WDA-artifacts/
          zip -r "../WDA-${{ steps.version.outputs.tag }}.zip" WDA-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WDA-${{ steps.version.outputs.tag }}
          path: WDA-${{ steps.version.outputs.tag }}.zip
